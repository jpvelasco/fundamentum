version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - unconvert
    - gosec
    - dupl

  settings:
    gosec:
      excludes:
        - G104
        - G204
        - G304
        - G704
    staticcheck:
      checks:
        - all
        - "-ST1005"
