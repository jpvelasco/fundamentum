name: Octocov

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  measure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Run tests with coverage
        run: go test ./... -v -coverprofile=coverage.out -covermode=atomic
      - name: Run octocov
        uses: k1LoW/octocov-action@v1