name: CI

on:
  push:
    branches: ["{{.DefaultBranch}}"]
  pull_request:
    branches: ["{{.DefaultBranch}}"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a  # v9
        with:
          version: v2.10.1

  vuln:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  build:
    name: Build
    strategy:
      # Full 3-OS matrix on push to the default branch; PRs skip macOS (10x minutes
      # on the free tier) — Linux + Windows already cover the cross-platform risk.
      matrix:
        os: ${{ github.event_name == 'push' && fromJSON('["ubuntu-latest", "windows-latest", "macos-latest"]') || fromJSON('["ubuntu-latest", "windows-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
      - run: go build -v ./...
      - run: go vet ./...

  test:
    name: Test
    strategy:
      # Full 3-OS matrix on push to the default branch; PRs skip macOS to conserve minutes.
      matrix:
        os: ${{ github.event_name == 'push' && fromJSON('["ubuntu-latest", "windows-latest", "macos-latest"]') || fromJSON('["ubuntu-latest", "windows-latest"]') }}
    runs-on: ${{ matrix.os }}
    # id-token lets the Linux job authenticate the Codecov upload via OIDC,
    # so no CODECOV_TOKEN secret is required in the repo.
    permissions:
      contents: read
      id-token: write
    steps:
      # fetch-depth: 0 so Codecov can walk git history for path mapping and so
      # parent/base SHAs exist when the App compares PR head vs the default branch
      # (avoids "Missing base commit" / unusable reports on shallow clones).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
      - name: Install gotestsum (Linux)
        if: runner.os == 'Linux'
        run: go install gotest.tools/gotestsum@v1.13.0
      - name: Run tests with race detection and coverage (Linux)
        if: runner.os == 'Linux'
        # gotestsum runs the suite once, prints readable output, and writes a
        # JUnit XML for Codecov Test Analytics. Flags after -- go to `go test`.
        run: |
          gotestsum --junitfile junit.xml --format pkgname -- \
            -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Run tests with race detection (macOS)
        if: runner.os == 'macOS'
        run: go test -race -v ./...
      - name: Run tests with race detection (Windows)
        if: runner.os == 'Windows'
        run: go test -race -v ./...
      - name: Display coverage summary
        if: runner.os == 'Linux'
        run: go tool cover -func=coverage.out
      # Codecov standard:
      #   - codecov-action@v7 only (no separate test-results-action)
      #   - Auth is XOR: OIDC when CODECOV_TOKEN is unset; token when set.
      #     (codecov-action: use_oidc ignores any token if both are enabled.)
      #   - Explicit override_* so push uploads are tagged with the real SHA/branch
      #     (the action only auto-fills those for pull_request events; empty CC_SHA
      #     on push leaves the default branch without a usable base report).
      #   - Do NOT add codecov/patch to ruleset required checks (soft gate).
      - name: Upload coverage to Codecov
        # Skip fork PRs: OIDC tokens aren't issued to forked-repo runs.
        if: runner.os == 'Linux' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          # OIDC when no secret; if CODECOV_TOKEN is set, use_oidc is false so
          # the upload token is actually used (not ignored).
          use_oidc: ${{ secrets.CODECOV_TOKEN == '' }}
          token: ${{ secrets.CODECOV_TOKEN }}
          use_pypi: true
          files: ./coverage.out
          slug: {{.Owner}}/{{.RepoName}}
          # PR head SHA on pull_request; otherwise the push SHA.
          override_commit: ${{ github.event.pull_request.head.sha || github.sha }}
          override_branch: ${{ github.head_ref || github.ref_name }}
          override_pr: ${{ github.event.pull_request.number }}
          fail_ci_if_error: true
      - name: Upload test results to Codecov
        # Test Analytics (failed-test / flaky reporting). Same Action as coverage
        # with report_type: test_results — replaces deprecated test-results-action.
        if: ${{ !cancelled() && runner.os == 'Linux' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          use_oidc: ${{ secrets.CODECOV_TOKEN == '' }}
          token: ${{ secrets.CODECOV_TOKEN }}
          use_pypi: true
          report_type: test_results
          files: ./junit.xml
          slug: {{.Owner}}/{{.RepoName}}
          override_commit: ${{ github.event.pull_request.head.sha || github.sha }}
          override_branch: ${{ github.head_ref || github.ref_name }}
          override_pr: ${{ github.event.pull_request.number }}
          fail_ci_if_error: false

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
      - name: Run gosec
        # Exclusions mirror the .golangci.yml gosec rationale (adjust per project):
        #   G204 command execution, G304 file inclusion via variable,
        #   G702/G703 command-injection / path-traversal taint analysis — noisy
        #   for CLI subprocess calls and config/state file reads.
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.27.1 -exclude=G204,G304,G702,G703 ./...

  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
