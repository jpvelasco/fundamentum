name: Octocov

on:
  push:
    branches: [{{.DefaultBranch}}]
  pull_request:
    branches: [{{.DefaultBranch}}]

permissions:
  contents: read
  pull-requests: write

jobs:
  measure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests with coverage
        run: go test ./... -v -coverprofile=coverage.out -covermode=atomic
      - name: Run octocov
        uses: k1LoW/octocov-action@v1