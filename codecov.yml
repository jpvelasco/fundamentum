# Project status is configured so Codecov still computes overall coverage in the UI.
# GitHub only reliably receives codecov/patch as a check; codecov/project often never
# posts (probe PR #25). Branch protection requires codecov/patch only — not project.
coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 1%
        if_not_found: success
    patch:
      default:
        target: 80%
        threshold: 1%
        if_not_found: success
