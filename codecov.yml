# Probe: confirm GitHub receives codecov/project (not only codecov/patch) on PRs.
# If project never appears while required on main, branch protection will stay BLOCKED.
coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 1%
        if_not_found: success
    patch:
      default:
        target: 80%
        threshold: 1%
        if_not_found: success
